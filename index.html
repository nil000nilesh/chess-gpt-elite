<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessGPT Elite</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&display=swap">

    <!-- CDN Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #020617; }
        .chess-title { font-family: 'Cinzel', serif; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes spin { to{transform:rotate(360deg)} }
        .float-animate { animation: float 3s ease-in-out infinite; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        .chess-piece-3d { display:inline-block; line-height:1; transition:transform 0.15s ease; }
        .square-selected { box-shadow: inset 0 0 0 3px rgba(59,130,246,0.95) !important; }
        .square-legal { position:relative; }
        .square-legal::after { content:''; position:absolute; inset:0; margin:auto; width:33%; height:33%; background:rgba(0,0,0,0.22); border-radius:50%; pointer-events:none; }
        .square-capture { position:relative; }
        .square-capture::after { content:''; position:absolute; inset:0; margin:auto; width:90%; height:90%; border:4px solid rgba(0,0,0,0.22); border-radius:50%; box-sizing:border-box; pointer-events:none; }
        .square-check { background: radial-gradient(circle, #ef4444 0%, transparent 70%) !important; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:#1e293b; }
        ::-webkit-scrollbar-thumb { background:#475569; border-radius:3px; }
        .tab-active { color:#fbbf24; border-bottom:2.5px solid #fbbf24; }
        .tab-inactive { color:#94a3b8; }
        .tab-inactive:hover { color:#cbd5e1; }
        .theme-preview { width:32px; height:32px; border-radius:4px; overflow:hidden; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
    </style>
</head>
<body>
<div id="root"></div>

<!-- Firebase init (plain JS — koi JSX nahi) -->
<script src="js/firebase.js"></script>

<!-- App Loader: engine + constants + app ek saath load karo same scope mein -->
<script>
(async function loadApp() {
    try {
        // Teeno files ka code fetch karo
        const [engineCode, constantsCode, appCode] = await Promise.all([
            fetch('js/engine.js').then(r => r.text()),
            fetch('js/constants.js').then(r => r.text()),
            fetch('js/app.js').then(r => r.text())
        ]);

        // Sab ek saath jodo — ek hi scope milegi
        const combined = engineCode + '\n\n' + constantsCode + '\n\n' + appCode;

        // Babel se JSX → JS compile karo
        const compiled = Babel.transform(combined, {
            presets: ['react'],
            filename: 'app.jsx'
        }).code;

        // Execute karo
        eval(compiled);

    } catch(err) {
        console.error('App load failed:', err);
        document.getElementById('root').innerHTML =
            '<div style="color:#f87171;text-align:center;padding:40px;font-family:sans-serif">' +
            '<div style="font-size:48px;margin-bottom:16px">⚠️</div>' +
            '<p style="font-size:18px;margin-bottom:8px">App load nahi ho saka</p>' +
            '<p style="font-size:13px;color:#94a3b8">' + err.message + '</p>' +
            '</div>';
    }
})();
</script>

</body>
</html>
