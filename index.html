<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessGPT Elite - AI Chess Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap');
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
        .chess-font { font-family: 'Playfair Display', serif; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .float-animate { animation: float 3s ease-in-out infinite; }
        .board-glow { box-shadow: 0 0 30px rgba(217, 119, 6, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        
        const ChessApp = () => {
          const [currentPuzzle, setCurrentPuzzle] = useState(null);
          const [board, setBoard] = useState('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR');
          const [gameStatus, setGameStatus] = useState('idle');
          const [score, setScore] = useState({ solved: 0, attempts: 0, streak: 0 });
          const [activeTab, setActiveTab] = useState('puzzles');
          const [playerUsername, setPlayerUsername] = useState('magnus');
          const [userGames, setUserGames] = useState([]);
          const [loadingGames, setLoadingGames] = useState(false);
          const [playerStats, setPlayerStats] = useState(null);

          useEffect(() => {
            fetchPuzzle();
          }, []);

          const fetchPuzzle = async () => {
            try {
              setGameStatus('loading');
              const response = await fetch('https://lichess.org/api/puzzle/daily?_format=json');
              const data = await response.json();
              if (data?.puzzle) {
                setCurrentPuzzle(data.puzzle);
                setGameStatus('playing');
              }
            } catch (err) {
              setGameStatus('error');
            }
          };

          const fetchUserGames = async (username) => {
            try {
              setLoadingGames(true);
              const [gamesRes, statsRes] = await Promise.all([
                fetch(`https://lichess.org/api/games/${username}?max=15`),
                fetch(`https://lichess.org/api/user/${username}`)
              ]);
              const games = await gamesRes.json();
              const stats = await statsRes.json();
              setUserGames(games || []);
              setPlayerStats(stats);
            } catch (err) {
              console.error(err);
            } finally {
              setLoadingGames(false);
            }
          };

          const renderBoard = () => {
            const pieces = { 'P': '♙', 'N': '♘', 'B': '♗', 'R': '♖', 'Q': '♕', 'K': '♔', 'p': '♟', 'n': '♞', 'b': '♝', 'r': '♜', 'q': '♛', 'k': '♚' };
            const ranks = ['8', '7', '6', '5', '4', '3', '2', '1'];
            const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];

            return React.createElement('div', { className: 'inline-block border-8 border-amber-900 shadow-2xl rounded-xl overflow-hidden board-glow' },
              ranks.map(rank => React.createElement('div', { key: rank, className: 'flex' },
                files.map(file => React.createElement('div', { 
                  key: file + rank, 
                  className: `w-16 h-16 flex items-center justify-center text-4xl font-bold ${(ranks.indexOf(rank) + files.indexOf(file)) % 2 === 0 ? 'bg-amber-100' : 'bg-amber-700'}`
                }, board && pieces[board[ranks.indexOf(rank) * 8 + files.indexOf(file)]] && pieces[board[ranks.indexOf(rank) * 8 + files.indexOf(file)]]))
              ))
            );
          };

          return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 p-6' },
            React.createElement('div', { className: 'max-w-7xl mx-auto' },
              // Header
              React.createElement('div', { className: 'flex justify-between items-center mb-8' },
                React.createElement('div', { className: 'flex items-center gap-3' },
                  React.createElement('div', { className: 'text-4xl float-animate' }, '♛'),
                  React.createElement('h1', { className: 'text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-amber-200' }, 'ChessGPT Elite')
                ),
                React.createElement('button', { onClick: fetchPuzzle, className: 'px-6 py-3 bg-blue-600 text-white rounded-lg hover:shadow-lg font-semibold flex items-center gap-2' }, '🔄 New Puzzle')
              ),

              // Tabs
              React.createElement('div', { className: 'flex gap-4 mb-6 border-b border-slate-700' },
                React.createElement('button', { onClick: () => setActiveTab('puzzles'), className: `pb-4 font-semibold ${activeTab === 'puzzles' ? 'text-amber-400 border-b-2 border-amber-400' : 'text-slate-400'}` }, '🧩 Daily Puzzles'),
                React.createElement('button', { onClick: () => setActiveTab('games'), className: `pb-4 font-semibold ${activeTab === 'games' ? 'text-amber-400 border-b-2 border-amber-400' : 'text-slate-400'}` }, '🎮 Player Games')
              ),

              // Puzzles Tab
              activeTab === 'puzzles' && React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-3 gap-8' },
                React.createElement('div', { className: 'lg:col-span-2 bg-slate-900/80 rounded-2xl p-8 border border-slate-700/50' },
                  gameStatus === 'loading' ? 
                    React.createElement('div', { className: 'flex items-center justify-center h-96' }, 
                      React.createElement('div', { className: 'text-center' },
                        React.createElement('div', { className: 'text-6xl mb-4 animate-pulse' }, '♘'),
                        React.createElement('p', { className: 'text-slate-400' }, 'Loading puzzle...')
                      )
                    ) :
                    React.createElement('div', { className: 'flex flex-col items-center' },
                      React.createElement('div', { className: 'mb-6' }, renderBoard()),
                      currentPuzzle && React.createElement('div', { className: 'w-full mt-6 p-4 bg-slate-800 rounded-lg border border-amber-500/30' },
                        React.createElement('p', { className: 'text-amber-400 font-semibold' }, `Theme: ${currentPuzzle.theme}`),
                        React.createElement('p', { className: 'text-slate-300 text-sm mt-2' }, `Rating: ${currentPuzzle.rating}`)
                      )
                    )
                ),
                React.createElement('div', { className: 'space-y-6' },
                  React.createElement('div', { className: 'bg-slate-800 rounded-2xl p-6 border border-slate-700/50' },
                    React.createElement('h2', { className: 'text-xl font-bold text-amber-400 mb-6' }, '📊 Performance'),
                    React.createElement('div', { className: 'space-y-4' },
                      React.createElement('div', { className: 'flex justify-between p-3 bg-slate-700/50 rounded-lg' },
                        React.createElement('span', { className: 'text-slate-400' }, 'Solved'),
                        React.createElement('span', { className: 'text-2xl font-bold text-green-400' }, score.solved)
                      ),
                      React.createElement('div', { className: 'flex justify-between p-3 bg-slate-700/50 rounded-lg' },
                        React.createElement('span', { className: 'text-slate-400' }, 'Streak 🔥'),
                        React.createElement('span', { className: 'text-2xl font-bold text-amber-400' }, score.streak)
                      ),
                      React.createElement('div', { className: 'flex justify-between p-3 bg-slate-700/50 rounded-lg' },
                        React.createElement('span', { className: 'text-slate-400' }, 'Accuracy'),
                        React.createElement('span', { className: 'text-2xl font-bold text-purple-400' }, `${score.attempts > 0 ? Math.round((score.solved / score.attempts) * 100) : 0}%`)
                      )
                    )
                  )
                )
              ),

              // Games Tab
              activeTab === 'games' && React.createElement('div', null,
                React.createElement('div', { className: 'mb-8 bg-slate-900/80 rounded-2xl p-8 border border-slate-700/50' },
                  React.createElement('h2', { className: 'text-2xl font-bold text-amber-400 mb-6' }, '👤 Player Analysis'),
                  React.createElement('div', { className: 'flex gap-3 flex-wrap mb-6' },
                    React.createElement('input', { type: 'text', value: playerUsername, onChange: (e) => setPlayerUsername(e.target.value), placeholder: 'Enter username', className: 'flex-1 min-w-64 px-4 py-3 bg-slate-800 text-white rounded-lg border border-slate-600 focus:border-blue-500 focus:outline-none' }),
                    React.createElement('button', { onClick: () => fetchUserGames(playerUsername), className: 'px-6 py-3 bg-blue-600 text-white rounded-lg hover:shadow-lg font-semibold', disabled: loadingGames }, loadingGames ? 'Loading...' : 'Search')
                  ),
                  React.createElement('div', { className: 'flex gap-2 flex-wrap' },
                    ['magnus', 'hikaru', 'fabiano', 'alireza2003', 'penguingim1'].map(p => React.createElement('button', { key: p, onClick: () => { setPlayerUsername(p); setTimeout(() => fetchUserGames(p), 100); }, className: 'px-3 py-1 text-sm bg-slate-800 text-amber-400 rounded hover:bg-slate-700' }, p))
                  )
                ),

                playerStats && React.createElement('div', { className: 'mb-8 grid grid-cols-1 md:grid-cols-4 gap-4' },
                  React.createElement('div', { className: 'bg-blue-900 rounded-2xl p-6' },
                    React.createElement('p', { className: 'text-blue-300 text-sm font-semibold mb-2' }, 'Player'),
                    React.createElement('p', { className: 'text-2xl font-bold text-blue-100' }, playerStats.username)
                  ),
                  React.createElement('div', { className: 'bg-purple-900 rounded-2xl p-6' },
                    React.createElement('p', { className: 'text-purple-300 text-sm font-semibold mb-2' }, 'Blitz'),
                    React.createElement('p', { className: 'text-2xl font-bold text-purple-100' }, playerStats.perfs?.blitz?.rating || 'N/A')
                  ),
                  React.createElement('div', { className: 'bg-pink-900 rounded-2xl p-6' },
                    React.createElement('p', { className: 'text-pink-300 text-sm font-semibold mb-2' }, 'Rapid'),
                    React.createElement('p', { className: 'text-2xl font-bold text-pink-100' }, playerStats.perfs?.rapid?.rating || 'N/A')
                  ),
                  React.createElement('div', { className: 'bg-green-900 rounded-2xl p-6' },
                    React.createElement('p', { className: 'text-green-300 text-sm font-semibold mb-2' }, 'Classical'),
                    React.createElement('p', { className: 'text-2xl font-bold text-green-100' }, playerStats.perfs?.classical?.rating || 'N/A')
                  )
                ),

                userGames.length > 0 && React.createElement('div', { className: 'space-y-4' },
                  userGames.slice(0, 10).map((game, idx) => React.createElement('div', { key: game.id, className: 'bg-slate-800 rounded-xl p-6 border border-slate-700' },
                    React.createElement('div', { className: 'flex justify-between items-start' },
                      React.createElement('div', null,
                        React.createElement('p', { className: 'font-semibold text-white mb-2' }, `Game #${idx + 1}`),
                        React.createElement('p', { className: 'text-slate-300' }, `${game.players.white.name} vs ${game.players.black.name}`)
                      ),
                      React.createElement('span', { className: `px-4 py-2 rounded font-bold ${game.winner === 'white' ? 'bg-amber-900/40 text-amber-300' : game.winner === 'black' ? 'bg-blue-900/40 text-blue-300' : 'bg-gray-700/40'}` }, game.winner?.toUpperCase() || 'DRAW')
                    ),
                    React.createElement('p', { className: 'text-slate-400 text-sm mt-3' }, `⚡ ${game.speed} • 📖 ${game.opening?.name || 'Unknown'}`)
                  ))
                )
              )
            )
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(ChessApp));
    </script>
</body>
</html>
